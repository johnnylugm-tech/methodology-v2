# Phase 配置（Johnny v5.56 完整版）
# Phase 1: 功能規格（已完成）
# Phase 2: 架構設計（已更新）

phases:
  1:
    name: "功能規格"
    type: "srs"
    deliverable: "SRS.md"
    directory: "01-requirements"
    
    # Johnny v5.56 強制配置
    quick_start: "dev"  # 強制使用 A/B 團隊（Architect + Reviewer）
    constitution_threshold: 70  # 門檻：70/100
    
    architect_prompt: "agent_templates/architect_prompt.md"
    reviewer_prompt: "agent_templates/reviewer_prompt.md"
    
    quality_gates:
      - name: "ASPICE 文檔檢查"
        command: "python3 quality_gate/doc_checker.py"
        threshold: "Compliance Rate ≥ 80%"
      - name: "Constitution 檢查（SRS）"
        command: "python3 quality_gate/constitution/runner.py --type srs"
        threshold: "Score ≥ 70/100"
      - name: "SPEC_TRACKING 檢查"
        command: "python3 cli.py spec-track check"
        threshold: "完整性 ≥ 90%"
    
    stage_criteria:
      - "SRS.md 存在且完整"
      - "Spec Logic Mapping 完整（每個需求都有邏輯驗證方法）"
      - "Constitution Score ≥ 70/100"
      - "ASPICE 合規率 > 80%"
      - "SPEC_TRACKING.md 完整性 ≥ 90%"
      - "領域知識檢查完成（附錄 X）"
      - "DEVELOPMENT_LOG.md 包含真實 QG 輸出"
    
    anti_shortcuts:
      - "禁止跳過 A/B 審查"
      - "禁止虛假記錄"
      - "禁止邏輯模糊"
    
    async_wait: true
    max_retries: 2
    timeout: 600

  2:
    name: "架構設計"
    type: "sad"
    deliverable: "SAD.md"
    directory: "02-architecture"
    
    # Johnny v5.56 Phase 2 強制配置
    quick_start: "dev"  # 強制使用 A/B 團隊
    constitution_threshold: 70  # 門檻：70/100
    
    # Phase 2 額外交付物
    extra_deliverables:
      - "DECISION_FRAMEWORK.md"  # 關鍵架構決策記錄
      - "TRACEABILITY_MATRIX.md"  # 需求→架構追蹤
    
    architect_prompt: "agent_templates/architect_prompt.md"
    reviewer_prompt: "agent_templates/reviewer_prompt.md"
    
    quality_gates:
      - name: "Phase Artifact Enforcer（確保 Phase 1 已結項）"
        command: "python3 quality_gate/phase_artifact_enforcer.py"
        threshold: "Phase 1 completed"
      - name: "ASPICE 文檔檢查"
        command: "python3 quality_gate/doc_checker.py"
        threshold: "Compliance Rate ≥ 80%"
      - name: "Constitution 檢查（SAD）"
        command: "python3 quality_gate/constitution/runner.py --type sad"
        threshold: "Score ≥ 70/100"
      - name: "Decision Framework 檢查"
        command: "python3 .methodology/decisions/check_decisions.py"
        threshold: "MEDIUM/HIGH risk decisions recorded"
      - name: "SPEC_TRACKING 更新"
        command: "python3 cli.py spec-track check"
        threshold: "完整性 ≥ 90%"
    
    stage_criteria:
      - "SAD.md 存在且完整"
      - "DECISION_FRAMEWORK.md 存在且完整（高風險決策已記錄）"
      - "TRACEABILITY_MATRIX.md 更新（需求 ID → 架構組件）"
      - "SRS → SAD 追蹤完整"
      - "模組分解合理（高內聚低耦合）"
      - "狀態機定義（如有流程）"
      - "Constitution Score ≥ 70/100"
      - "Security Scanner 整合點預留"
    
    # Phase 2 A/B 挑戰重點
    ab_challenges:
      - "外部 API 失敗時的熔斷機制"
      - "Output ≤ Input 基本邏輯"
      - "安全性掃描設計"
      - "可擴展性評估"
      - "Lazy Check 邏輯"
    
    anti_shortcuts:
      - "禁止『先寫 code 後補設計』：SAD 必須領先於實作"
      - "禁止忽略安全性掃描設計"
      - "禁止無記錄決策：重大技術選型必須記錄於 DECISION_FRAMEWORK"
    
    async_wait: true
    max_retries: 2
    timeout: 600

# 可補缺口配置（與 Johnny v5.56 一致）
gap_filling:
  async_wait:
    enabled: true
    method: "polling"
    interval: 5
    
  qg_parser:
    enabled: false
    standard_format: "json"
    
  domain_loader:
    enabled: false
    default_domain: "generic"

# Anti-Shortcuts 全域配置
anti_shortcuts_global:
  enabled: true
  rules:
    - "禁止單一 Agent 自編自審"
    - "禁止虛假記錄 DEVELOPMENT_LOG"
    - "禁止邏輯模糊（必須有 Spec Logic Mapping）"
    - "Constitution < 70 = Phase 未完成"