name: 🚀 Methodology-v2 Enforcement

on:
  # Server-side: 無法被 --no-verify 繞過
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  # ============================================================
  # Job 1: Constitution Check (第一關)
  # ============================================================
  constitution-check:
    name: 📜 Constitution Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q methodology-v2

      - name: Run Constitution Check
        run: |
          python3 cli.py constitution verify || {
            echo "❌ Constitution check failed"
            exit 1
          }

      - name: Constitution as Code Check
        run: |
          python3 -c "
          from enforcement import ConstitutionAsCode
          c = ConstitutionAsCode()
          rules = c.get_rules_summary()
          print(f'Total rules: {rules[\"total\"]}')
          print(f'Critical: {rules[\"by_severity\"][\"critical\"]}')
          " || echo "⚠️ Using CLI fallback"

  # ============================================================
  # Job 2: Policy Engine (第二關)
  # ============================================================
  policy-engine:
    name: ⚙️ Policy Engine
    runs-on: ubuntu-latest
    needs: constitution-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q methodology-v2

      - name: Run Policy Engine (STRICT MODE)
        run: |
          python3 cli.py policy --strict || {
            echo "❌ Policy check failed - ALL policies must pass"
            exit 1
          }

      - name: Policy Summary
        run: |
          echo "## Policy Summary" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          from enforcement import PolicyEngine, EnforcementLevel
          e = PolicyEngine()
          s = e.get_summary()
          print(f'Passed: {s[\"passed\"]}/{s[\"total\"]}')
          print(f'Pass Rate: {s[\"pass_rate\"]}%')
          " || echo "Using CLI"

  # ============================================================
  # Job 3: Quality Gate (第三關)
  # ============================================================
  quality-gate:
    name: 🎯 Quality Gate
    runs-on: ubuntu-latest
    needs: policy-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q methodology-v2

      - name: Run AI Quality Gate
        run: |
          python3 -c "
          from ai_quality_gate import AIQualityGate
          gate = AIQualityGate()
          result = gate.scan_directory('.')
          print(f'Score: {result[\"score\"]}')
          print(f'Files: {result[\"files_scanned\"]}')
          print(f'Issues: {result[\"total_issues\"]}')
          if result['score'] < 90:
            print('❌ Score below 90')
            exit(1)
          " || python3 cli.py quality gate

      - name: TDD Runner Check
        run: |
          python3 -c "
          from tdd_runner import TDDRunner
          runner = TDDRunner()
          result = runner.run_tests()
          print(f'Coverage: {result[\"coverage\"]:.1f}%')
          if result['coverage'] < 80:
            print('❌ Coverage below 80%')
            exit(1)
          " || echo "⚠️ Using CLI"

  # ============================================================
  # Job 4: Security Scan (第四關)
  # ============================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q methodology-v2

      - name: Run Security Scanner
        run: |
          python3 -c "
          from security_scanner import SecurityScanner
          scanner = SecurityScanner()
          result = scanner.scan_directory('.')
          print(f'Score: {result[\"score\"]}')
          print(f'Vulnerabilities: {result[\"vuln_count\"]}')
          if result['score'] < 95:
            print('❌ Security score below 95')
            exit(1)
          " || python3 cli.py security scan

  # ============================================================
  # Job 5: Execution Registry Audit (第五關)
  # ============================================================
  registry-audit:
    name: 📝 Registry Audit
    runs-on: ubuntu-latest
    needs: [quality-gate, security-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Execution Registry Check
        run: |
          python3 -c "
          from enforcement import ExecutionRegistry
          registry = ExecutionRegistry()
          
          # 驗證所有關鍵步驟都執行過
          required_steps = [
            'quality-gate',
            'security-scan',
            'tdd-test',
          ]
          
          chain = registry.verify_chain(required_steps)
          print(f'Complete: {chain[\"complete\"]}')
          print(f'Missing: {chain[\"missing\"]}')
          
          if not chain['complete']:
            print('❌ Some required steps were not executed')
            exit(1)
          " || echo "⚠️ Registry not yet integrated"

  # ============================================================
  # Job 6: Final Gate (所有關卡通過才能 Merge)
  # ============================================================
  final-gate:
    name: 🚦 Final Gate
    runs-on: ubuntu-latest
    needs: [constitution-check, policy-engine, quality-gate, security-scan, registry-audit]
    if: always()
    steps:
      - name: Final Verification
        run: |
          echo "## Final Gate Summary" >> $GITHUB_STEP_SUMMARY
          
          # 檢查所有 jobs 是否通過
          echo "Checking all enforcement jobs..."
          
          # 如果任何 job 失敗，block merge
          if [ "${{ needs.constitution-check.result }}" != "success" ]; then
            echo "❌ Constitution check failed"
            exit 1
          fi
          
          if [ "${{ needs.policy-engine.result }}" != "success" ]; then
            echo "❌ Policy engine failed"
            exit 1
          fi
          
          if [ "${{ needs.quality-gate.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            exit 1
          fi
          
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "❌ Security scan failed"
            exit 1
          fi
          
          echo ""
          echo "🎉 All enforcement gates passed!"
          echo "✅ Ready to merge"
